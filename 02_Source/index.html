<!doctype html>
<html lang="es">
  <!--
    Este archivo es el punto de entrada de la aplicación cuando se sirve
    02_Source/ como raíz. Las rutas son relativas para funcionar también
    si esta carpeta se abre desde GitHub Pages como subdirectorio del repo.
  -->
  <head>
    <meta charset="UTF-8" />
    <title>MusicAI</title>
    <!-- Redirección de respaldo vía HTML puro, por si el navegador ejecuta el
         <head> antes de que el <script> corra o si JavaScript falla a mitad de carga. -->
    <meta http-equiv="refresh" content="0; url=pages/login.html" />
    <script>
      // Redirección principal. El meta refresh de arriba queda como respaldo
      // en caso de que JavaScript esté deshabilitado en el navegador.
      window.location.replace("pages/login.html");
    </script>
  </head>
  <body>
    <!-- Solo se muestra si el navegador tiene JavaScript desactivado y el
         meta refresh no disparó todavía; da al usuario una salida manual. -->
    <noscript>
      <p>
        Este prototipo requiere JavaScript habilitado. Si no fuiste redirigido
        automáticamente,
        <a href="pages/login.html">haz clic aquí para continuar</a>.
      </p>
    </noscript>
  </body>
</html>
